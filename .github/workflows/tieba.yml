name: Tieba Sign

on:
  workflow_dispatch:
  schedule:
    - cron: '30 18 * * *'   # 每天 UTC 时间 18:30，对应北京时间凌晨 2:30

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 强制使用 Node.js 24

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # 升级到 v4，支持 Node.js 24

      - name: Set up Python
        uses: actions/setup-python@v5   # 升级到 v5，支持 Node.js 24
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tieba Sign script
        run: |
          python 1.py
